<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Cairo',sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#1d4f91 0%,#0c2447 45%,#071427 100%);

    overflow:hidden;
    position:relative;

}

body::before{

    content:'';
    position:absolute;

    width:700px;
    height:700px;

    border-radius:50%;

    background:rgba(255,255,255,.03);

    top:-300px;
    right:-250px;

}

body::after{

    content:'';
    position:absolute;

    width:500px;
    height:500px;

    border-radius:50%;

    background:rgba(255,255,255,.03);

    bottom:-220px;
    left:-180px;

}

.login-card{

    width:100%;
    max-width:420px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(24px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:32px;

    padding:40px 30px;

    position:relative;
    z-index:2;

    box-shadow:
    0 20px 60px rgba(0,0,0,.35);

}

.logo{

    text-align:center;
    margin-bottom:28px;

}

.logo img{

    width:120px;
    filter:brightness(10);

}

.title{

    color:#fff;
    text-align:center;

    font-size:28px;
    font-weight:800;

    margin-bottom:10px;

}

.sub{

    color:rgba(255,255,255,.65);

    text-align:center;

    font-size:14px;

    margin-bottom:30px;

}

.label{

    color:#fff;

    font-size:14px;
    font-weight:600;

    margin-bottom:10px;

}

.input{

    width:100%;
    height:58px;

    border:none;
    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);

    padding:0 18px;

    color:#fff;

    font-size:15px;

    margin-bottom:20px;

    font-family:'Cairo';

}

.input::placeholder{

    color:rgba(255,255,255,.4);

}

.input:focus{

    border-color:#4da3ff;

    background:rgba(255,255,255,.12);

}

.login-btn{

    width:100%;
    height:58px;

    border:none;

    border-radius:18px;

    background:linear-gradient(135deg,#1f6fe5,#3ba5ff);

    color:#fff;

    font-size:16px;
    font-weight:800;

    font-family:'Cairo';

    cursor:pointer;

    transition:.25s;

    margin-top:8px;

    box-shadow:
    0 12px 30px rgba(59,165,255,.35);

}

.login-btn:hover{

    transform:translateY(-2px);

}

.error{

    background:rgba(239,68,68,.15);

    border:1px solid rgba(239,68,68,.2);

    color:#fecaca;

    padding:14px;

    border-radius:16px;

    margin-bottom:18px;

    display:none;

    text-align:center;

    font-size:14px;

}

.loader{

    display:none;

    margin-top:18px;

    text-align:center;

    color:rgba(255,255,255,.65);

    font-size:13px;

}

</style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <img src="assets/logo.webp">
    </div>

    <div class="title">
        تسجيل دخول الإدارة
    </div>

    <div class="sub">
        قم بتسجيل الدخول للوصول إلى لوحة التحكم
    </div>

    <div class="error" id="errorBox">
        البريد الإلكتروني أو كلمة المرور غير صحيحة
    </div>

    <div class="label">
        البريد الإلكتروني
    </div>

    <input
        type="email"
        id="email"
        class="input"
        placeholder="admin@example.com"
    >

    <div class="label">
        كلمة المرور
    </div>

    <input
        type="password"
        id="password"
        class="input"
        placeholder="********"
    >

    <button class="login-btn" id="loginBtn">
        تسجيل الدخول
    </button>

    <div class="loader" id="loader">
        جاري تسجيل الدخول...
    </div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAn-HhrIthqkmRLuj3sqi8a-ljh5LOGiUc",
  authDomain: "tijari-5eca3.firebaseapp.com",
  projectId: "tijari-5eca3",
  storageBucket: "tijari-5eca3.firebasestorage.app",
  messagingSenderId: "7756517323",
  appId: "1:7756517323:web:127ca80b98db27e7a7704e",
  measurementId: "G-3SNVJZVP5T"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const loginBtn = document.getElementById("loginBtn");

const loader = document.getElementById("loader");

const errorBox = document.getElementById("errorBox");

/* already logged in */

onAuthStateChanged(auth,(user)=>{

    if(user){

        window.location.href = "dashboard.html";

    }

});

/* login */

/* enter key */

document.addEventListener("keydown",(e)=>{

    if(e.key === "Enter"){

        loginBtn.click();

    }

});

/* login */

loginBtn.onclick = async ()=>{

    const email = document.getElementById("email").value.trim();

    const password = document.getElementById("password").value.trim();

    errorBox.style.display = "none";

    if(!email || !password){

        errorBox.innerText = "يرجى تعبئة جميع الحقول";

        errorBox.style.display = "block";

        return;

    }

    loader.style.display = "flex";

    loginBtn.disabled = true;

    loginBtn.style.opacity = ".7";

    try{

        await signInWithEmailAndPassword(auth,email,password);

        window.location.href = "dashboard.html";

    }catch(error){

        errorBox.innerText = "بيانات الدخول غير صحيحة";

        errorBox.style.display = "block";

    }

    loader.style.display = "none";

    loginBtn.disabled = false;

    loginBtn.style.opacity = "1";

};

</script>

</body>
</html>
