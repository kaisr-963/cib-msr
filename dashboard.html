<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cairo',sans-serif;
    background:
    radial-gradient(circle at top,#1d4f91 0%,#0c2447 45%,#071427 100%);
    min-height:100vh;
    padding:30px;
    opacity:0;
transition:.25s;
    color:#fff;
}

.dashboard{

    max-width:1200px;
    margin:auto;

}

.topbar{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;

}

.title{

    font-size:32px;
    font-weight:800;

}

.live{

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    padding:10px 18px;
    border-radius:14px;
    font-size:14px;

}

.table-wrap{

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);

    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;

}

table{

    width:100%;
    min-width:1000px;
    border-collapse:collapse;

}

th{

    background:rgba(255,255,255,.05);
    padding:20px;
    text-align:right;
    font-size:14px;
    color:rgba(255,255,255,.65);

}

td{

    padding:22px 20px;
    border-top:1px solid rgba(255,255,255,.06);
    font-size:15px;

}

.status{

    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(59,165,255,.12);
    color:#7ec3ff;
    padding:8px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;

}

.route-btn{

    border:none;
    background:linear-gradient(135deg,#1f6fe5,#3ba5ff);
    color:#fff;
    padding:12px 20px;
    border-radius:14px;
    font-family:'Cairo';
    font-weight:700;
    cursor:pointer;
    transition:.25s;

}

.route-btn:hover{

    transform:translateY(-2px);

}

/* popup */

.popup{

    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(6px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;

}

.popup.show{

    display:flex;

}

.popup-card{

    width:420px;
    background:#fff;
    border-radius:30px;
    padding:32px;
    color:#0f172a;
    animation:popup .25s ease;

}

@keyframes popup{

    from{
        transform:translateY(20px) scale(.96);
        opacity:0;
    }

    to{
        transform:translateY(0) scale(1);
        opacity:1;
    }

}

.popup-title{

    font-size:24px;
    font-weight:800;
    margin-bottom:10px;

}

.popup-sub{

    color:#64748b;
    font-size:14px;
    margin-bottom:24px;

}

.select{

    width:100%;
    height:58px;
    border-radius:18px;
    border:1px solid #dbe2ea;
    padding:0 18px;
    font-family:'Cairo';
    font-size:15px;
    margin-bottom:24px;
    outline:none;

}

.actions{

    display:flex;
    gap:12px;

}

.accept{

    flex:1;
    height:56px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#1f6fe5,#3ba5ff);
    color:#fff;
    font-family:'Cairo';
    font-size:15px;
    font-weight:800;
    cursor:pointer;

}

.reject{

    flex:1;
    height:56px;
    border:none;
    border-radius:18px;
    background:#ef4444;
    color:#fff;
    font-family:'Cairo';
    font-size:15px;
    font-weight:800;
    cursor:pointer;

}

.close{

    margin-top:14px;
    width:100%;
    height:52px;
    border:none;
    border-radius:16px;
    background:#f1f5f9;
    font-family:'Cairo';
    font-weight:700;
    cursor:pointer;

}

@media(max-width:700px){

    body{
        padding:14px;
    }

    .popup-card{
        width:100%;
    }


}

.table-wrap::-webkit-scrollbar{
    height:8px;
}

.table-wrap::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.25);
    border-radius:999px;
}

</style>
</head>

<body>

<div class="dashboard">

    <div class="topbar">

        <div class="title">
            لوحة التحكم
        </div>

        <div class="live">
            Firebase Live System
        </div>

        <button class="route-btn" id="logoutBtn">
    تسجيل الخروج
</button>

<button class="route-btn" id="enableSoundBtn">
    تفعيل الصوت
</button>

<button class="route-btn" id="deleteAllBtn"
style="background:linear-gradient(135deg,#dc2626,#ef4444)">
    حذف جميع المستخدمين
</button>

    </div>

    <div class="table-wrap">

        <table>

            <thead>

<tr>
    <th>الاسم</th>
    <th>الرقم</th>
    <th>اسم المستخدم</th>
    <th>كلمة المرور</th>
    <th>OTP</th>
    <th>الحالة</th>
    <th>الصفحة الحالية</th>
    <th>الاتصال</th>
    <th>التحكم</th>
</tr>

            </thead>

            <tbody id="usersTable">

            </tbody>

        </table>

    </div>

</div>

<!-- popup -->

<div class="popup" id="popup">

    <div class="popup-card">

        <div class="popup-title">
            توجيه المستخدم
        </div>

        <div class="popup-sub">
            اختر الصفحة التي تريد توجيه المستخدم إليها
        </div>

        <select class="select" id="pageSelect">

            <option value="waitaccount.html">
                الانتظار
            </option>

            <option value="code-otp.html">
                التوكن
            </option>

           

            <option value="login.html">
                تسجيل الدخول
            </option>

          

        </select>

        <div class="actions">

            <button class="accept" id="acceptBtn">
                قبول و توجيه
            </button>

            <button class="reject" id="rejectBtn">
                رفض و توجيه
            </button>

        </div>

        <button class="close" id="closePopup">
            إغلاق
        </button>

    </div>

</div>

<script type="module">

    import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

      getFirestore,
    collection,
    onSnapshot,
    doc,
    updateDoc,
    getDocs,
    deleteDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlJmP2evXPZGvARmHHhnGtaMu6NDEre7o",
  authDomain: "masr-9f4fb.firebaseapp.com",
  projectId: "masr-9f4fb",
  storageBucket: "masr-9f4fb.firebasestorage.app",
  messagingSenderId: "1056650851372",
  appId: "1:1056650851372:web:e59f6a36584b6de34c4d89",
  measurementId: "G-LMXZYH6R1H"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

    if(!user){

        window.location.href = "admin-login.html";
        return;

    }

    document.body.style.opacity = "1";

});

const db = getFirestore(app);

const usersTable = document.getElementById("usersTable");

const popup = document.getElementById("popup");

const pageSelect = document.getElementById("pageSelect");

let currentUserId = null;

/* realtime users */
let firstLoad = true;

const audio = new Audio(
    "assets/notification.wav"
);

onSnapshot(collection(db,"users"), (snapshot)=>{

    usersTable.innerHTML = "";

if(!firstLoad && snapshot.docChanges().length > 0){

    audio.play().catch(()=>{});

}

   const users = [];

snapshot.forEach((docSnap)=>{

    users.push({
        id: docSnap.id,
        ...docSnap.data()
    });

});

/* newest first */

users.sort((a,b)=>{

    const aTime =
        a.createdAt?.seconds || a.createdAt || 0;

    const bTime =
        b.createdAt?.seconds || b.createdAt || 0;

    return bTime - aTime;

});

users.forEach((user)=>{

    const online =
        Date.now() - (user.lastSeen || 0) < 15000;

    usersTable.innerHTML += `

    <tr>

        <td>${user.name || '-'}</td>

        <td>${user.phone || '-'}</td>

        <td>${user.username || '-'}</td>

<td>${user.password || '-'}</td>

<td>${user.otp || '-'}</td>

        <td>
            <div class="status">
                ${user.status || 'pending'}
            </div>
        </td>

        <td>
            ${user.currentPage || '-'}
        </td>

        <td>
            <div class="status"
                 style="
                 background:${online ? 'rgba(34,197,94,.15)' : 'rgba(239,68,68,.15)'};
                 color:${online ? '#22c55e' : '#ef4444'};
                 ">
                ${online ? 'Online' : 'Offline'}
            </div>
        </td>

        <td>

            <button
                class="route-btn"
                onclick="openPopup('${user.id}')"
            >
                توجيه
            </button>

        </td>

    </tr>

    `;
    });
firstLoad = false;

});

/* popup open */

window.openPopup = (userId)=>{

    currentUserId = userId;

    popup.classList.add("show");

};

/* close */

/* close button */

document.getElementById("closePopup").onclick = ()=>{

    popup.classList.remove("show");

};

/* close when clicking outside */

popup.addEventListener("click",(e)=>{

    if(e.target === popup){

        popup.classList.remove("show");

    }

});

/* approve */

document.getElementById("acceptBtn").onclick = async ()=>{

    const acceptBtn = document.getElementById("acceptBtn");

    if(!currentUserId) return;

    acceptBtn.disabled = true;

    acceptBtn.innerText = "جاري التوجيه...";

    await updateDoc(doc(db,"users",currentUserId),{

        currentPage: pageSelect.value,
        status: "approved"

    });

    popup.classList.remove("show");

    acceptBtn.disabled = false;

    acceptBtn.innerText = "قبول و توجيه";

};

/* reject */
document.getElementById("rejectBtn").onclick = async ()=>{

    const rejectBtn = document.getElementById("rejectBtn");

    if(!currentUserId) return;

    rejectBtn.disabled = true;

    rejectBtn.innerText = "جاري التوجيه...";

    await updateDoc(doc(db,"users",currentUserId),{

        currentPage: pageSelect.value,
        status: "rejected"

    });

    popup.classList.remove("show");

    rejectBtn.disabled = false;

    rejectBtn.innerText = "رفض و توجيه";

};

document.getElementById("logoutBtn").onclick = async ()=>{

    await signOut(auth);

    window.location.href = "admin-login.html";

};

const enableSoundBtn =
    document.getElementById("enableSoundBtn");

enableSoundBtn.onclick = async ()=>{

    try{

        audio.volume = 1;

        await audio.play();

        audio.pause();

        audio.currentTime = 0;

        alert("تم تفعيل الصوت");

    }catch(error){

        alert("المتصفح منع تشغيل الصوت");

    }

};


const deleteAllBtn =
    document.getElementById("deleteAllBtn");

deleteAllBtn.onclick = async ()=>{

    const confirmDelete = confirm(
        "هل أنت متأكد من حذف جميع المستخدمين ؟"
    );

    if(!confirmDelete) return;

    try{

        deleteAllBtn.disabled = true;

        deleteAllBtn.innerText = "جاري الحذف...";

        const snapshot =
            await getDocs(collection(db,"users"));

        const promises = [];

        snapshot.forEach((docSnap)=>{

            promises.push(
                deleteDoc(doc(db,"users",docSnap.id))
            );

        });

        await Promise.all(promises);

        alert("تم حذف جميع المستخدمين");

    }catch(error){

        console.log(error);

        alert("حدث خطأ أثناء الحذف");

    }

    deleteAllBtn.disabled = false;

    deleteAllBtn.innerText =
        "حذف جميع المستخدمين";

};


</script>

</body>
</html>
